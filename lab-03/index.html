<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pental Shop Lab-3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Welcome to Pental Shop <span class="lab">Lab-3</span></h1>

    <h2>About This Lab</h2>

    <p>
        In this lab, you will learn basic HTML structure,
        formatting text, creating simple tables, and using forms for input.
    </p>

    <table>
     <tr>
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Status</th>
     </tr>

        <tr>
            <td>Pencils</td>
            <td>100</td>
            <td>In Stock</td>
        </tr>

        <tr>
            <td>Notebooks</td>
            <td>50</td>
            <td>Low Stock</td>
        </tr>

        <tr>
            <td>Markers</td>
            <td>15</td>
            <td>In Stock</td>
        </tr>
    </table>

<div class="form-box">
        <h2>Contact Information</h2>

     <form>
            <label for="name">Name</label>
            <input type="text" id="name" name="name">

                <br><br>

<label for="email">Email</label>
            <input type="email" id="email" name="email">

            <br><br>

    <label for="message">Message</label>
            <textarea id="message" name="message" rows="4"></textarea>

            <br><br>

        <button type="submit">Submit</button>
        </form>
    </div>

</body>
</html>
